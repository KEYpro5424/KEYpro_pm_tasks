<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM CORE - Soft Sky Edition</title>
    <style>
        /* =========================================
           CSS Variables & Base Styles (Soft Theme)
        ========================================= */
        :root {
            --bg-gradient-1: #f0f9ff;
            --bg-gradient-2: #e0f2fe;
            --bg-gradient-3: #bae6fd;
            --surface-white: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-heading: #1e293b; /* 柔らかいが視認性の高いスレートグレー */
            --text-body: #475569;
            --text-muted: #94a3b8;
            --primary-blue: #38bdf8;
            --primary-hover: #0ea5e9;
            --badge-bg: #7dd3fc;
            --border-soft: rgba(255, 255, 255, 1);
            --shadow-soft: 0 10px 30px -5px rgba(14, 165, 233, 0.15);
            --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
            --radius-xl: 32px;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        /* 非常にゆっくりとした空の揺らぎアニメーション */
        @keyframes softSky {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-body);
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-1));
            background-size: 300% 300%;
            animation: softSky 20s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* =========================================
           Header
        ========================================= */
        header {
            padding: 40px 24px 10px;
            z-index: 10;
        }
        header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-hover);
            letter-spacing: 0.5px;
        }
        header p {
            margin: 4px 0 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* =========================================
           Dashboard & Circle Cards
        ========================================= */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 24px;
            justify-content: flex-start;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        .circle-block {
            position: relative;
            width: calc(33.333% - 14px);
            aspect-ratio: 1 / 1;
            max-width: 140px;
            max-height: 140px;
            background: var(--surface-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--border-soft);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }
        
        @media (min-width: 600px) {
            .circle-block { width: 140px; }
        }

        .circle-block:hover {
            transform: translateY(-4px) scale(1.03);
            background: var(--surface-solid);
            box-shadow: 0 15px 35px -5px rgba(14, 165, 233, 0.25);
        }
        .circle-block:active { transform: scale(0.96); }

        .circle-block.add-new {
            background: transparent;
            border: 2px dashed rgba(14, 165, 233, 0.3);
            box-shadow: none;
            color: var(--primary-blue);
        }
        .circle-block.add-new:hover {
            background: rgba(255, 255, 255, 0.5);
            border-color: var(--primary-hover);
        }

        .circle-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-heading);
            padding: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--badge-bg);
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 700;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(125, 211, 252, 0.5);
            border: 3px solid var(--surface-solid);
        }

        /* =========================================
           Modal (Bottom Sheet)
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(224, 242, 254, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            background: var(--surface-solid);
            box-shadow: 0 -10px 40px rgba(14, 165, 233, 0.1);
            width: 100%;
            height: 85vh;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        @media (min-width: 600px) {
            .modal-overlay { align-items: center; }
            .modal-content {
                width: 90%; max-width: 600px; height: auto; max-height: 85vh;
                border-radius: var(--radius-xl);
                transform: translateY(30px) scale(0.95);
            }
            .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }
        }

        .modal-handle {
            width: 40px; height: 5px;
            background-color: #cbd5e1;
            border-radius: 5px; margin: 16px auto;
        }

        .modal-header {
            padding: 0 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title-input {
            background: none; border: none; color: var(--text-heading);
            font-size: 1.5rem; font-weight: 800; width: 100%;
            outline: none;
        }
        .close-btn {
            background: #f1f5f9; border: none; color: var(--text-muted);
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .close-btn:hover { background: #e2e8f0; color: var(--text-heading); }

        /* =========================================
           Task List
        ========================================= */
        .task-list-container {
            padding: 0 24px 24px; overflow-y: auto; flex-grow: 1;
        }
        
        .task-item {
            display: flex; align-items: flex-start;
            padding: 16px; margin-bottom: 12px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: var(--radius-lg);
            transition: all 0.3s ease;
        }
        .task-item:hover { background: #ffffff; box-shadow: var(--shadow-soft); }
        
        /* 丸くて優しいチェックボックス */
        .task-checkbox {
            appearance: none; width: 24px; height: 24px;
            border: 2px solid #bae6fd;
            border-radius: 50%; margin-right: 16px;
            cursor: pointer; position: relative; flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background-color: #ffffff;
        }
        .task-checkbox:checked {
            background: var(--primary-blue);
            border-color: var(--primary-blue);
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.4);
        }
        .task-checkbox:checked::after {
            content: ''; position: absolute;
            top: 5px; left: 8px; width: 4px; height: 10px;
            border: solid #fff; border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .task-text {
            flex-grow: 1; outline: none; line-height: 1.5;
            min-height: 24px; font-size: 1rem; color: var(--text-heading);
            font-weight: 500;
        }
        .task-item.completed .task-text {
            text-decoration: line-through; color: var(--text-muted); font-weight: 400;
        }

        .delete-task-btn {
            background: none; border: none; color: #cbd5e1;
            cursor: pointer; font-size: 1.2rem; padding: 0 8px;
            transition: color 0.2s;
        }
        .delete-task-btn:hover { color: #f43f5e; }

        /* =========================================
           Inputs & Buttons
        ========================================= */
        .add-task-area {
            display: flex; margin-top: 24px; gap: 12px;
        }
        .add-task-input {
            flex-grow: 1;
            background: #f8fafc;
            border: 2px solid transparent;
            color: var(--text-heading); padding: 16px; border-radius: var(--radius-md);
            font-size: 1rem; outline: none; transition: all 0.3s;
            box-shadow: var(--shadow-inner);
        }
        .add-task-input:focus { 
            background: #ffffff;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }
        
        .add-task-btn {
            background: var(--primary-blue);
            color: #ffffff; border: none; border-radius: var(--radius-md);
            padding: 0 28px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
            transition: all 0.2s;
        }
        .add-task-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .add-task-btn:active { transform: scale(0.96); }

        .toggle-completed-btn {
            width: 100%; background: none; border: none;
            color: var(--text-muted); padding: 24px 0 12px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            text-align: left; transition: color 0.2s;
        }
        .toggle-completed-btn:hover { color: var(--primary-hover); }

        .delete-block-btn {
            background: #fff1f2;
            color: #f43f5e;
            border: none;
            padding: 16px; margin: 0 24px 24px; border-radius: var(--radius-md);
            font-size: 0.95rem; cursor: pointer; font-weight: 700;
            text-align: center; transition: all 0.2s;
        }
        .delete-block-btn:hover { background: #ffe4e6; }
    </style>
</head>
<body>

    <header>
        <h1>PM Tasks</h1>
        <p>Soft Sky Environment</p>
    </header>

    <div class="dashboard" id="dashboard">
        <!-- Dashboard items generated by JS -->
    </div>

    <!-- Modal Base -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <input type="text" class="modal-title-input" id="modal-title" placeholder="タイトルを入力...">
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            
            <div class="task-list-container">
                <div id="active-tasks"></div>

                <div class="add-task-area">
                    <input type="text" class="add-task-input" id="new-task-input" placeholder="新しいタスクを入力" onkeypress="handleEnter(event)">
                    <button class="add-task-btn" onclick="addTask()">追加</button>
                </div>

                <button class="toggle-completed-btn" id="toggle-completed-btn" onclick="toggleCompleted()">完了済みを表示</button>
                <div id="completed-tasks" style="display: none;"></div>
            </div>

            <button class="delete-block-btn" onclick="deleteCurrentBlock()">このブロックを削除</button>
        </div>
    </div>

    <script>
        /**
         * 状態管理とローカルストレージの制御
         */
        const STORAGE_KEY = 'pm_task_board_v6_soft'; 
        let blocks = [];
        let currentBlockId = null;
        let showCompleted = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderDashboard();

            // モーダルのタイトル編集イベント
            document.getElementById('modal-title').addEventListener('input', (e) => {
                if(currentBlockId) {
                    const block = blocks.find(b => b.id === currentBlockId);
                    if(block) {
                        block.title = e.target.value;
                        saveData();
                        renderDashboard();
                    }
                }
            });
        });

        // データの読み込み処理
        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                blocks = JSON.parse(savedData);
            } else {
                // 初期データ
                blocks = [
                    { id: '1', title: 'STUDIO', items: [{ id: 't1', text: '都内Aスタジオ 仮キープ', completed: false }] },
                    { id: '2', title: 'CATERING', items: [{ id: 't2', text: '朝食の手配', completed: false }] },
                    { id: '3', title: 'CASTING', items: [{ id: 't3', text: 'オーディション資料作成', completed: false }] }
                ];
                saveData();
            }
        }

        // データの保存処理
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(blocks));
        }

        // ダッシュボード（丸いカード）の描画
        function renderDashboard() {
            const dashboardEl = document.getElementById('dashboard');
            dashboardEl.innerHTML = '';

            blocks.forEach(block => {
                const uncompletedCount = block.items.filter(item => !item.completed).length;

                const circleEl = document.createElement('div');
                circleEl.className = 'circle-block';
                circleEl.onclick = () => openModal(block.id);

                const titleEl = document.createElement('div');
                titleEl.className = 'circle-title';
                titleEl.innerText = block.title || '無題';
                circleEl.appendChild(titleEl);

                // 未完了タスクのバッジ表示
                if (uncompletedCount > 0) {
                    const badgeEl = document.createElement('div');
                    badgeEl.className = 'badge';
                    badgeEl.innerText = uncompletedCount;
                    circleEl.appendChild(badgeEl);
                }

                dashboardEl.appendChild(circleEl);
            });

            // 新規追加ボタン
            const addCircle = document.createElement('div');
            addCircle.className = 'circle-block add-new';
            addCircle.innerHTML = '<div class="circle-title" style="font-size: 2.2rem; font-weight: 300;">＋</div>';
            addCircle.onclick = addNewBlock;
            dashboardEl.appendChild(addCircle);
        }

        // 新規ブロックの作成
        function addNewBlock() {
            const newBlock = { id: Date.now().toString(), title: 'New Category', items: [] };
            blocks.push(newBlock);
            saveData();
            renderDashboard();
            openModal(newBlock.id);
        }

        // モーダルの開閉処理
        function openModal(blockId) {
            currentBlockId = blockId;
            const block = blocks.find(b => b.id === blockId);
            if(!block) return;

            document.getElementById('modal-title').value = block.title;
            showCompleted = false;
            updateToggleBtnText();
            document.getElementById('completed-tasks').style.display = 'none';

            renderTasks();
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // 背景スクロールの防止
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentBlockId = null;
            document.body.style.overflow = 'auto';
            renderDashboard();
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('modal')) closeModal();
        });

        // タスクリストの描画
        function renderTasks() {
            const block = blocks.find(b => b.id === currentBlockId);
            if(!block) return;

            const activeContainer = document.getElementById('active-tasks');
            const completedContainer = document.getElementById('completed-tasks');
            activeContainer.innerHTML = '';
            completedContainer.innerHTML = '';

            block.items.forEach(item => {
                const taskEl = document.createElement('div');
                taskEl.className = `task-item ${item.completed ? 'completed' : ''}`;

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = item.completed;
                checkbox.onchange = () => toggleTaskStatus(item.id, checkbox.checked);

                const textEl = document.createElement('div');
                textEl.className = 'task-text';
                textEl.contentEditable = true;
                textEl.innerText = item.text;
                textEl.addEventListener('blur', (e) => updateTaskText(item.id, e.target.innerText));

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-task-btn';
                delBtn.innerHTML = '✕';
                delBtn.onclick = () => deleteTask(item.id);

                taskEl.appendChild(checkbox);
                taskEl.appendChild(textEl);
                taskEl.appendChild(delBtn);

                if(item.completed) {
                    completedContainer.appendChild(taskEl);
                } else {
                    activeContainer.appendChild(taskEl);
                }
            });
        }

        // タスクの追加と更新
        function addTask() {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if(!text || !currentBlockId) return;

            const block = blocks.find(b => b.id === currentBlockId);
            block.items.push({ id: Date.now().toString(), text: text, completed: false });

            saveData();
            input.value = '';
            renderTasks();
            renderDashboard();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTask();
            }
        }

        function toggleTaskStatus(taskId, isCompleted) {
            const block = blocks.find(b => b.id === currentBlockId);
            const task = block.items.find(t => t.id === taskId);
            if(task) {
                task.completed = isCompleted;
                saveData();
                renderTasks();
                renderDashboard();
            }
        }

        function updateTaskText(taskId, newText) {
            const block = blocks.find(b => b.id === currentBlockId);
            const task = block.items.find(t => t.id === taskId);
            if(task && task.text !== newText) {
                task.text = newText;
                saveData();
            }
        }

        function deleteTask(taskId) {
            const block = blocks.find(b => b.id === currentBlockId);
            block.items = block.items.filter(t => t.id !== taskId);
            saveData();
            renderTasks();
            renderDashboard();
        }

        function toggleCompleted() {
            showCompleted = !showCompleted;
            document.getElementById('completed-tasks').style.display = showCompleted ? 'block' : 'none';
            updateToggleBtnText();
        }

        function updateToggleBtnText() {
            const btn = document.getElementById('toggle-completed-btn');
            btn.innerText = showCompleted ? '完了済みを隠す' : '完了済みを表示';
        }

        function deleteCurrentBlock() {
            if(confirm('このブロックを削除しますか？')) {
                blocks = blocks.filter(b => b.id !== currentBlockId);
                saveData();
                closeModal();
            }
        }
    </script>
</body>
</html>
